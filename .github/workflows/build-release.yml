name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: macos-release
          - os: windows-latest
            artifact-name: windows-release
          - os: ubuntu-latest
            artifact-name: linux-x64-release
          - os: ubuntu-24.04-arm
            artifact-name: linux-arm64-release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install pyinstaller pillow

      - name: Build release
        run: python build_release.py

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/*.zip
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
